name: Release Tag and Publish Package

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      pre_release:
        description: 'Create as pre-release'
        required: false
        default: false
        type: boolean

permissions:
  id-token: write # Required for OIDC
  contents: read

jobs:
  release-and-publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.PUSH_TO_MAIN_APP_ID }}
          private-key: ${{ secrets.PUSH_TO_MAIN_APP_PRIVATE_KEY }}
          owner: Zipstack
          repositories: |
            llmwhisperer-js-client

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.generate-token.outputs.token }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Bump version and create release
        id: create_release
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "Current version: $CURRENT_VERSION"

          NEW_VERSION=$(npm version ${{ github.event.inputs.version_bump }} --no-git-tag-version)
          NEW_VERSION=${NEW_VERSION#v}
          echo "New version: $NEW_VERSION"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

          git add package.json package-lock.json
          git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
          git push origin main

          git tag "v$NEW_VERSION"
          git push origin "v$NEW_VERSION"

          gh release create "v$NEW_VERSION" \
            --title "Release v$NEW_VERSION" \
            --generate-notes \
            ${{ github.event.inputs.pre_release == 'true' && '--prerelease' || '' }}

          echo "Created release v$NEW_VERSION"
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}

      - name: Verify version update
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "Package.json version: $PACKAGE_VERSION"
          echo "Target version: ${{ steps.create_release.outputs.version }}"
          if [ "$PACKAGE_VERSION" != "${{ steps.create_release.outputs.version }}" ]; then
            echo "Version mismatch! Exiting..."
            exit 1
          fi

      - run: npm run build --if-present
      - run: npm run lint
      - run: npm test
      - run: npm publish --provenance --access public

      - name: Success message
        run: |
          echo "Successfully published version ${{ steps.create_release.outputs.version }} to NPM"
          echo "Release: https://github.com/${{ github.repository }}/releases/tag/v${{ steps.create_release.outputs.version }}"
          echo "NPM: https://www.npmjs.com/package/llmwhisperer-client/v/${{ steps.create_release.outputs.version }}"
